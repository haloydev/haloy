name: Test

on:
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
          cache: false

      - name: Install Task
        uses: go-task/setup-task@v2

      - name: Install tools
        run: task tools

      - name: Run CI checks
        run: task ci-test

  vulnerability-scan:
    name: Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
          cache: false

      - name: Install Task
        uses: go-task/setup-task@v2

      - name: Install tools
        run: task tools

      - name: Run vulnerability scan
        continue-on-error: true
        run: task vuln
